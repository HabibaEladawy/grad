name: dana_graduation_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.3.0
  toggle_switch: ^2.3.0
  flutter_localizations:
    sdk: flutter
  intl: any
  intl_phone_field: ^3.2.0
  animate_do: ^4.2.0
  dio: ^5.8.0+1
  get_it: ^8.0.3
  flutter_bloc: ^9.0.0
  provider: ^6.0.5
  flutter_svg: ^2.0.9
  smooth_page_indicator: ^1.2.1
  shared_preferences: ^2.5.3
  flutter_screenutil: ^5.9.3
  cupertino_icons: ^1.0.8
  pinput: ^5.0.0
  country_code_picker: ^3.0.0
  confetti: ^0.7.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  internet_connection_checker_plus: ^2.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  android: true
  web: false
  color: "#F9FAFA"
  android_12:
    fullscreen: true
    image: assets/Images/logo.png

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/Images/
    - assets/icons/
    - assets/Images/doctor_circle.png
    - assets/Images/exam_1.png
