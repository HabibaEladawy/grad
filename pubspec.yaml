name: dana_graduation_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  toggle_switch: ^2.3.0
  flutter_localizations:
    sdk: flutter
  intl: any
  intl_phone_field: ^3.2.0
  animate_do: ^4.2.0
  dio: ^5.8.0+1
  get_it: ^9.2.1
  flutter_bloc: ^9.0.0
  provider: ^6.0.5
  flutter_svg: ^2.0.9
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.5.3
  flutter_screenutil: ^5.9.3
  cupertino_icons: ^1.0.8
  pinput: ^6.0.2
  country_code_picker: ^3.0.0
  confetti: ^0.8.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  internet_connection_checker_plus: ^2.7.1
  flutter_rating_bar: ^4.0.1
  curved_navigation_bar: ^1.0.6
  fl_chart: ^0.66.0
  youtube_player_flutter: ^9.1.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  android: true
  web: false
  color: "#F9FAFA"
  android_12:
    fullscreen: true
    image: assets/Images/logo.png

flutter:
  generate: true
  uses-material-design: true

  assets:

    - assets/icons/
    - assets/Images/
    - assets/Images/home/
    - assets/Images/appointment/
    - assets/Images/videos/
    - assets/icons/appointments/
    - assets/icons/child_profile/
    - assets/icons/examination/
    - assets/icons/home/
    - assets/icons/notification/
    - assets/icons/profile/
    - assets/icons/vaccine/

